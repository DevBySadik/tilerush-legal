<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tile Rush - Privacy Policy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #080C18; color: #E2E8F0; min-height: 100vh; visibility: hidden; }
  .header { background: linear-gradient(135deg, #6366F1, #EC4899); padding: 40px 20px; text-align: center; }
  .logo { font-size: 42px; font-weight: 900; color: white; letter-spacing: 4px; text-shadow: 0 0 30px rgba(99,102,241,0.8); }
  .subtitle { color: rgba(255,255,255,0.8); font-size: 14px; margin-top: 8px; letter-spacing: 2px; }
  .lang-switch { display: flex; justify-content: center; gap: 10px; margin-top: 16px; }
  .lang-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 6px 18px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 700; letter-spacing: 1px; transition: all 0.2s; }
  .lang-btn.active { background: white; color: #6366F1; }
  .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
  .card { background: #141E30; border: 1px solid #1E293B; border-radius: 16px; padding: 30px; margin-bottom: 20px; }
  .card h2 { color: #6366F1; font-size: 16px; letter-spacing: 1px; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
  .card h2::before { content: ''; display: inline-block; width: 4px; height: 18px; background: linear-gradient(#6366F1, #EC4899); border-radius: 2px; }
  .card p { color: #94A3B8; line-height: 1.8; font-size: 14px; }
  .card ul { color: #94A3B8; line-height: 2; font-size: 14px; padding-left: 20px; margin-top: 10px; }
  .card ul li strong { color: #E2E8F0; }
  .date { text-align: center; color: #475569; font-size: 12px; margin-bottom: 30px; letter-spacing: 1px; }
  .contact-card { background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(236,72,153,0.05)); border: 1px solid rgba(99,102,241,0.3); border-radius: 16px; padding: 30px; text-align: center; margin-bottom: 20px; }
  .contact-card h2 { color: #6366F1; margin-bottom: 10px; font-size: 16px; }
  .contact-card p { color: #94A3B8; margin-bottom: 10px; font-size: 14px; }
  .contact-card a { color: #818CF8; text-decoration: none; font-size: 15px; }
  .footer { text-align: center; padding: 30px; color: #475569; font-size: 12px; border-top: 1px solid #1E293B; margin-top: 20px; }
  .nav { text-align: center; margin-top: 10px; margin-bottom: 30px; }
  .nav a { color: #6366F1; text-decoration: none; font-size: 13px; border: 1px solid rgba(99,102,241,0.4); padding: 8px 20px; border-radius: 20px; margin: 0 8px; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">🧩 TILE RUSH</div>
  <div class="subtitle" id="subtitle"></div>
  <div class="lang-switch">
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="btn-tr" onclick="setLang('tr')">TR</button>
  </div>
</div>

<div class="container">
  <p class="date">Last updated / Son güncelleme: May 30, 2026</p>

  <div class="card">
    <h2 id="c1-title"></h2>
    <p id="c1-text"></p>
    <ul id="c1-list"></ul>
  </div>

  <div class="card">
    <h2 id="c2-title"></h2>
    <p id="c2-text"></p>
  </div>

  <div class="card">
    <h2 id="c3-title"></h2>
    <p id="c3-text"></p>
  </div>

  <div class="card">
    <h2 id="c4-title"></h2>
    <p id="c4-text"></p>
  </div>

  <div class="card">
    <h2 id="c5-title"></h2>
    <p id="c5-text"></p>
  </div>

  <div class="contact-card">
    <h2 id="contact-title"></h2>
    <p id="contact-text"></p>
    <a href="mailto:sadiksiyak@gmail.com">sadiksiyak@gmail.com</a>
  </div>

  <div class="nav">
    <a href="index.html" id="nav-home"></a>
    <a href="terms-of-service.html" id="nav-terms"></a>
  </div>
</div>

<div class="footer">© 2026 TILE RUSH · DEVBYSADIK · ALL RIGHTS RESERVED</div>

<script>
const content = {
  en: {
    subtitle: 'PRIVACY POLICY',
    c1: {
      title: 'Information We Collect',
      text: 'Tile Rush does not collect any personal information directly. However, we use third-party services that may collect data:',
      list: [
        '<strong>Google AdMob</strong> — for displaying advertisements',
        '<strong>Google Play Games</strong> — for leaderboards and achievements'
      ]
    },
    c2: {
      title: 'How We Use Information',
      text: 'Information collected by third-party services is used solely to display relevant advertisements and provide game services. We do not sell or share your data with any other parties.'
    },
    c3: {
      title: 'Advertising',
      text: 'We use Google AdMob to serve ads. AdMob may use your device\'s advertising ID to show personalized ads. You can opt out in your device settings under Google → Ads.'
    },
    c4: {
      title: 'Data Security',
      text: 'We take reasonable precautions to protect your information. Game progress and scores are stored locally on your device using SharedPreferences. No sensitive personal data is transmitted to our servers.'
    },
    c5: {
      title: "Children's Privacy",
      text: 'Tile Rush is suitable for all ages. We do not knowingly collect personal information from children under 13. If you believe we have collected such information, please contact us immediately.'
    },
    contact: {
      title: 'Contact Us',
      text: 'Questions about this privacy policy?'
    },
    navHome: '← Home',
    navTerms: 'Terms of Service →'
  },
  tr: {
    subtitle: 'GİZLİLİK POLİTİKASI',
    c1: {
      title: 'Topladığımız Bilgiler',
      text: 'Tile Rush doğrudan kişisel bilgi toplamaz. Ancak veri toplayabilecek üçüncü taraf hizmetler kullanıyoruz:',
      list: [
        '<strong>Google AdMob</strong> — reklam gösterimi için',
        '<strong>Google Play Games</strong> — sıralama tabloları ve başarımlar için'
      ]
    },
    c2: {
      title: 'Bilgileri Nasıl Kullanıyoruz',
      text: 'Üçüncü taraf hizmetlerin topladığı bilgiler yalnızca ilgili reklamları göstermek ve oyun hizmetleri sunmak için kullanılır. Verilerinizi başka taraflarla satmıyor veya paylaşmıyoruz.'
    },
    c3: {
      title: 'Reklamcılık',
      text: 'Reklam sunmak için Google AdMob kullanıyoruz. AdMob, kişiselleştirilmiş reklamlar göstermek için cihazınızın reklam kimliğini kullanabilir. Cihaz ayarlarınızdan Google → Reklamlar bölümünden devre dışı bırakabilirsiniz.'
    },
    c4: {
      title: 'Veri Güvenliği',
      text: 'Bilgilerinizi korumak için makul önlemler alıyoruz. Oyun ilerlemesi ve puanlar cihazınızda yerel olarak SharedPreferences kullanılarak saklanır. Sunucularımıza herhangi bir kişisel veri iletilmez.'
    },
    c5: {
      title: 'Çocukların Gizliliği',
      text: 'Tile Rush her yaşa uygundur. 13 yaşın altındaki çocuklardan bilerek kişisel bilgi toplamıyoruz. Böyle bir durum olduğunu düşünüyorsanız lütfen derhal bizimle iletişime geçin.'
    },
    contact: {
      title: 'İletişim',
      text: 'Gizlilik politikası hakkında sorularınız mı var?'
    },
    navHome: '← Ana Sayfa',
    navTerms: 'Kullanım Koşulları →'
  }
};

function setLang(lang) {
  const d = content[lang];
  document.getElementById('subtitle').textContent = d.subtitle;
  document.getElementById('c1-title').textContent = d.c1.title;
  document.getElementById('c1-text').textContent = d.c1.text;
  document.getElementById('c1-list').innerHTML = d.c1.list.map(i => '<li>' + i + '</li>').join('');
  document.getElementById('c2-title').textContent = d.c2.title;
  document.getElementById('c2-text').textContent = d.c2.text;
  document.getElementById('c3-title').textContent = d.c3.title;
  document.getElementById('c3-text').textContent = d.c3.text;
  document.getElementById('c4-title').textContent = d.c4.title;
  document.getElementById('c4-text').textContent = d.c4.text;
  document.getElementById('c5-title').textContent = d.c5.title;
  document.getElementById('c5-text').textContent = d.c5.text;
  document.getElementById('contact-title').textContent = d.contact.title;
  document.getElementById('contact-text').textContent = d.contact.text;
  document.getElementById('nav-home').textContent = d.navHome;
  document.getElementById('nav-terms').textContent = d.navTerms;
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-tr').classList.toggle('active', lang === 'tr');
  localStorage.setItem('lang', lang);
}

const saved = localStorage.getItem('lang') || (navigator.language.startsWith('tr') ? 'tr' : 'en');
setLang(saved);
document.body.style.visibility = 'visible';
</script>
</body>
</html>
