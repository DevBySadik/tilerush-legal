<style>

  .card p { color: #94A3B8; line-height: 1.8; font-size: 14px; }
  .date { text-align: center; color: #475569; font-size: 12px; margin-bottom: 30px; letter-spacing: 1px; }
  .contact-card { background: linear-gradient(135deg, rgba(236,72,153,0.15), rgba(99,102,241,0.05)); border: 1px solid rgba(236,72,153,0.3); border-radius: 16px; padding: 30px; text-align: center; margin-bottom: 20px; }
  .contact-card h2 { color: #EC4899; margin-bottom: 10px; font-size: 16px; }
  .contact-card p { color: #94A3B8; margin-bottom: 10px; font-size: 14px; }
  .contact-card a { color: #F472B6; text-decoration: none; font-size: 15px; }
  .footer { text-align: center; padding: 30px; color: #475569; font-size: 12px; border-top: 1px solid #1E293B; margin-top: 20px; }
  .nav { text-align: center; margin-top: 10px; margin-bottom: 30px; }
  .nav a { color: #EC4899; text-decoration: none; font-size: 13px; border: 1px solid rgba(236,72,153,0.4); padding: 8px 20px; border-radius: 20px; margin: 0 8px; }
</style>
</head>
<body>

    c3: { title: 'In-App Purchases', text: 'Tile Rush offers optional in-app purchases including virtual coins and premium features. All purchases are processed through Google Play and are subject to Google Play\'s refund policy. Virtual items have no real-world monetary value and cannot be transferred, exchanged, or refunded outside of Google Play\'s policies.' },
    c4: { title: 'Advertisements', text: 'The free version of Tile Rush displays advertisements provided by Google AdMob. By using the free version, you consent to the display of personalized or non-personalized ads. You may remove ads through an in-app purchase.' },
    c5: { title: 'Limitation of Liability', text: 'Tile Rush is provided "as is" without warranties of any kind, express or implied. The developer is not liable for any direct, indirect, incidental, or consequential damages arising from your use or inability to use the game, including data loss or device issues.' },
    c6: { title: 'Changes to Terms', text: 'We reserve the right to update or modify these terms at any time without prior notice. We will notify users of significant changes through the app or our website. Your continued use of Tile Rush after any changes constitutes your acceptance of the new terms.' },
    contact: { title: 'Contact Us', text: 'Questions or concerns about these terms?' },
    navPrivacy: '← Privacy Policy',
    navHome: 'Home →'
  },
  tr: {
    subtitle: 'KULLANIM KOŞULLARI',
    c1: { title: 'Koşulların Kabulü', text: 'Tile Rush\'ı indirerek veya oynayarak bu kullanım koşullarını kabul etmiş olursunuz. Bu koşulların herhangi bir bölümüne katılmıyorsanız lütfen oyunu indirmeyin veya kullanmayın.' },
    c2: { title: 'Oyun Kullanımı', text: 'Tile Rush yalnızca kişisel, ticari olmayan eğlence amaçlı sunulmaktadır. Geliştiriciden önceden yazılı izin almadan oyunu veya içeriklerini kopyalayamaz, değiştiremez, tersine mühendislik uygulayamaz, kaynak koda dönüştüremez veya dağıtamazsınız.' },
    c3: { title: 'Uygulama İçi Satın Almalar', text: 'Tile Rush sanal para ve premium özellikler dahil isteğe bağlı uygulama içi satın almalar sunar. Tüm satın almalar Google Play üzerinden işlenir ve Google Play\'in iade politikasına tabidir. Sanal öğelerin gerçek para değeri yoktur ve Google Play politikaları dışında transfer edilemez veya iade edilemez.' },
    c4: { title: 'Reklamlar', text: 'Tile Rush\'ın ücretsiz sürümü Google AdMob tarafından sağlanan reklamlar gösterir. Ücretsiz sürümü kullanarak kişiselleştirilmiş veya kişiselleştirilmemiş reklam gösterimine onay vermiş olursunuz. Uygulama içi satın alma ile reklamları kaldırabilirsiniz.' },
    c5: { title: 'Sorumluluk Sınırlaması', text: 'Tile Rush, açık veya zımni hiçbir garanti verilmeksizin "olduğu gibi" sunulmaktadır. Geliştirici, veri kaybı veya cihaz sorunları dahil olmak üzere oyunun kullanımından veya kullanılamamasından kaynaklanan doğrudan, dolaylı veya sonuçsal zararlardan sorumlu değildir.' },
    c6: { title: 'Koşullardaki Değişiklikler', text: 'Bu koşulları önceden bildirimde bulunmaksızın istediğimiz zaman güncelleme veya değiştirme hakkını saklı tutarız. Önemli değişiklikleri uygulama veya web sitemiz aracılığıyla kullanıcılara bildireceğiz. Değişikliklerden sonra Tile Rush\'ı kullanmaya devam etmeniz yeni koşulları kabul ettiğiniz anlamına gelir.' },
    contact: { title: 'İletişim', text: 'Bu koşullar hakkında sorularınız veya endişeleriniz mi var?' },
    navPrivacy: '← Gizlilik Politikası',
    navHome: 'Ana Sayfa →'
  }
};

function setLang(lang) {
  const d = content[lang];
  document.getElementById('subtitle').textContent = d.subtitle;
  for (let i = 1; i <= 6; i++) {
    document.getElementById('c'+i+'-title').textContent = d['c'+i].title;
    document.getElementById('c'+i+'-text').textContent = d['c'+i].text;
  }
  document.getElementById('contact-title').textContent = d.contact.title;
  document.getElementById('contact-text').textContent = d.contact.text;
  document.getElementById('nav-privacy').textContent = d.navPrivacy;
  document.getElementById('nav-home').textContent = d.navHome;
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-tr').classList.toggle('active', lang === 'tr');
  localStorage.setItem('lang', lang);
}

const saved = localStorage.getItem('lang') || (navigator.language.startsWith('tr') ? 'tr' : 'en');
setLang(saved);
document.body.style.visibility = 'visible';
</script>
</body>
</html>
